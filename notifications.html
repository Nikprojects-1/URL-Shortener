<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications — LinkPulse</title>
  <link rel="stylesheet" href="css/style.css" /><link rel="stylesheet" href="css/dashboard.css" /><link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <div class="particles"></div>
  <div class="app-layout"><div class="main-content">
    <header class="topbar"></header>
    <main class="page-content">
      <div class="page-header flex-between reveal"><div><h1>Notifications Center</h1><p>Stay updated on clicks, campaigns, and team activity</p></div><button class="btn btn-ghost" onclick="Notifications.info('All marked as read')">Mark all read</button></div>
      <div class="filters-bar reveal"><button class="filter-chip active">All</button><button class="filter-chip">Clicks</button><button class="filter-chip">QR</button><button class="filter-chip">Campaigns</button><button class="filter-chip">Security</button><button class="filter-chip">Team</button></div>
      <div id="notifications-full"></div>
    </main>
  </div></div>
  <script src="js/data.js"></script><script src="js/themes.js"></script><script src="js/notifications.js"></script><script src="js/app.js"></script>
  <script>document.addEventListener('DOMContentLoaded',()=>{const icons={click:'👆',qr:'📷',campaign:'🎯',warning:'⚠️',team:'👥',security:'🔒'};let html='';for(let i=0;i<30;i++){const n=DEMO.notifications[i%DEMO.notifications.length];html+=`<div class="glass-card reveal mb-2" style="display:flex;gap:1rem;align-items:flex-start;${!n.read?'border-left:4px solid var(--primary)':''}"><span style="font-size:1.5rem">${icons[n.type]||'ℹ️'}</span><div style="flex:1"><strong>${n.title}</strong><p class="text-muted">${n.message}</p><span class="text-muted" style="font-size:0.8rem">${n.time} • ${i+1}h ago</span></div>${!n.read?'<span class="badge badge-primary">New</span>':''}</div>`;}document.getElementById('notifications-full').innerHTML=html;});</script>
</body>
</html>
