<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — LinkPulse</title>
  <link rel="stylesheet" href="css/style.css" /><link rel="stylesheet" href="css/responsive.css" />
</head>
<body class="landing-page">
  <div class="particles"></div>
  <nav class="landing-nav scrolled"><div class="container"><a href="index.html" class="nav-logo">⚡ Link<span>Pulse</span></a><div class="nav-actions"><button class="btn btn-ghost btn-icon" data-theme-toggle>🌙</button><a href="dashboard.html" class="btn btn-primary">Dashboard</a></div></div></nav>
  <section class="section" style="padding-top:8rem">
    <div class="container" style="max-width:600px">
      <h1 class="reveal text-center">Contact Us</h1>
      <p class="text-muted text-center mt-2 reveal">Have questions? We'd love to hear from you.</p>
      <form class="glass-card mt-4 reveal" onsubmit="event.preventDefault();Notifications.success('Message sent! We will respond within 24 hours.');">
        <div class="form-group"><label class="form-label">Name</label><input class="form-input" required /></div>
        <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" required /></div>
        <div class="form-group"><label class="form-label">Subject</label><select class="form-select"><option>General Inquiry</option><option>Sales</option><option>Support</option><option>Enterprise</option></select></div>
        <div class="form-group"><label class="form-label">Message</label><textarea class="form-textarea" rows="5" required></textarea></div>
        <button type="submit" class="btn btn-primary" style="width:100%">Send Message</button>
      </form>
      <div class="grid grid-3 gap-2 mt-4 reveal text-center">
        <div class="glass-card"><strong>📧</strong><p class="text-muted mt-1">support@linkpulse.io</p></div>
        <div class="glass-card"><strong>💬</strong><p class="text-muted mt-1">Live chat 24/7</p></div>
        <div class="glass-card"><strong>📚</strong><p class="text-muted mt-1">docs.linkpulse.io</p></div>
      </div>
    </div>
  </section>
  <footer class="footer"><div class="container footer-bottom"><span>© 2025 LinkPulse</span><a href="index.html">← Back to Home</a></div></footer>
  <script src="js/themes.js"></script><script src="js/notifications.js"></script><script src="js/app.js"></script>
</body>
</html>
