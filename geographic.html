<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geographic Analytics — LinkPulse</title>
  <link rel="stylesheet" href="css/style.css" /><link rel="stylesheet" href="css/dashboard.css" /><link rel="stylesheet" href="css/analytics.css" /><link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <div class="particles"></div>
  <div class="app-layout"><div class="main-content">
    <header class="topbar"></header>
    <main class="page-content">
      <div class="page-header reveal"><h1>Geographic Analytics</h1><p>Global traffic distribution and regional insights</p></div>
      <div class="metric-row reveal" id="geo-metrics"></div>
      <div class="chart-card reveal mb-3"><h3>World Traffic Map</h3><div class="world-map" id="world-map"></div></div>
      <div class="dashboard-row">
        <div class="glass-card reveal"><h3 class="mb-3">Top Countries</h3><div class="country-grid" id="countries-list"></div></div>
        <div class="glass-card reveal"><h3 class="mb-3">Top Cities</h3><div id="cities-list"></div></div>
      </div>
    </main>
  </div></div>
  <script src="js/data.js"></script><script src="js/charts.js"></script><script src="js/themes.js"></script><script src="js/notifications.js"></script><script src="js/app.js"></script><script src="js/analytics.js"></script>
  <script>document.addEventListener('DOMContentLoaded',()=>{document.getElementById('geo-metrics').innerHTML=`<div class="metric-mini"><div class="value">190+</div><div class="label">Countries</div></div><div class="metric-mini"><div class="value">US</div><div class="label">Top Country</div></div><div class="metric-mini"><div class="value">22.9%</div><div class="label">US Share</div></div><div class="metric-mini"><div class="value">NYC</div><div class="label">Top City</div></div>`;document.getElementById('cities-list').innerHTML=DEMO.cities.map(c=>`<div class="link-item"><span>${c.name}, ${c.country}</span><strong class="text-success">${App.formatNumber(c.clicks)}</strong></div>`).join('');});</script>
</body>
</html>
