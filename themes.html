<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dark / Light Themes — LinkPulse</title>
  <link rel="stylesheet" href="css/style.css" /><link rel="stylesheet" href="css/dashboard.css" /><link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <div class="particles"></div>
  <div class="app-layout"><div class="main-content">
    <header class="topbar"></header>
    <main class="page-content">
      <div class="page-header reveal"><h1>Theme Customization</h1><p>Personalize your dashboard appearance</p></div>
      <div class="grid grid-2 gap-3 reveal">
        <div class="glass-card" style="cursor:pointer" onclick="ThemeManager.setTheme('dark')">
          <div style="height:120px;background:#0F172A;border-radius:var(--radius-md);margin-bottom:1rem;border:2px solid var(--primary)"></div>
          <h3>🌙 Dark Mode</h3><p class="text-muted">Futuristic dark theme (default)</p>
          <span class="theme-label badge badge-primary mt-2">Dark Mode</span>
        </div>
        <div class="glass-card" style="cursor:pointer" onclick="ThemeManager.setTheme('light')">
          <div style="height:120px;background:#F8FAFC;border-radius:var(--radius-md);margin-bottom:1rem;border:1px solid #E2E8F0"></div>
          <h3>☀️ Light Mode</h3><p class="text-muted">Clean light theme</p>
          <span class="theme-label badge badge-accent mt-2">Light Mode</span>
        </div>
      </div>
      <div class="glass-card reveal mt-3 text-center">
        <button class="btn btn-primary btn-lg" data-theme-toggle>Toggle Theme</button>
        <p class="text-muted mt-2">Theme preference is saved automatically</p>
      </div>
      <div class="glass-card reveal mt-3"><h3 class="mb-3">Accent Colors (Demo)</h3>
        <div class="flex gap-2 flex-wrap">
          <div style="width:48px;height:48px;background:#7C3AED;border-radius:8px;cursor:pointer" title="Purple"></div>
          <div style="width:48px;height:48px;background:#06B6D4;border-radius:8px;cursor:pointer" title="Cyan"></div>
          <div style="width:48px;height:48px;background:#22C55E;border-radius:8px;cursor:pointer" title="Green"></div>
          <div style="width:48px;height:48px;background:#F59E0B;border-radius:8px;cursor:pointer" title="Amber"></div>
          <div style="width:48px;height:48px;background:#EF4444;border-radius:8px;cursor:pointer" title="Red"></div>
        </div>
      </div>
    </main>
  </div></div>
  <script src="js/data.js"></script><script src="js/themes.js"></script><script src="js/notifications.js"></script><script src="js/app.js"></script>
</body>
</html>
