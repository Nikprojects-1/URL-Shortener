<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Results — LinkPulse</title>
  <link rel="stylesheet" href="css/style.css" /><link rel="stylesheet" href="css/dashboard.css" /><link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <div class="particles"></div>
  <div class="app-layout"><div class="main-content">
    <header class="topbar"></header>
    <main class="page-content">
      <div class="page-header reveal"><h1>Search Results</h1><p id="search-query-display">Showing results for: <strong id="query-text">all</strong></p></div>
      <div class="filters-bar reveal"><input type="search" class="form-input" id="search-input" placeholder="Search..." style="flex:1" /><button class="btn btn-primary" id="search-btn">Search</button></div>
      <div id="search-results"></div>
      <div class="glass-card reveal mt-3"><h3 class="mb-3">Campaigns matching search</h3><div id="search-campaigns"></div></div>
    </main>
  </div></div>
  <script src="js/data.js"></script><script src="js/themes.js"></script><script src="js/notifications.js"></script><script src="js/app.js"></script>
  <script>
    function doSearch() {
      const q = (new URLSearchParams(location.search).get('q') || document.getElementById('search-input').value || '').toLowerCase();
      document.getElementById('query-text').textContent = q || 'all';
      document.getElementById('search-input').value = q;
      const links = DEMO.links.filter(l => !q || l.title.toLowerCase().includes(q) || l.shortUrl.includes(q) || l.longUrl.toLowerCase().includes(q)).slice(0, 30);
      document.getElementById('search-results').innerHTML = links.length ? links.map(l => `<div class="link-item glass-card reveal mb-2"><div class="link-info"><div class="link-title">${l.title}</div><div class="link-url">${l.shortUrl}</div><p class="text-muted" style="font-size:0.85rem">${l.longUrl}</p></div><div><span class="text-success">${App.formatNumber(l.clicks)} clicks</span><a href="link-details.html?id=${l.id}" class="btn btn-ghost btn-sm">View</a></div></div>`).join('') : '<div class="empty-state"><div class="empty-state-icon">🔍</div><p>No results found</p></div>';
      const camps = DEMO.campaigns.filter(c => !q || c.name.toLowerCase().includes(q));
      document.getElementById('search-campaigns').innerHTML = camps.map(c => `<div class="link-item"><strong>${c.name}</strong><span class="badge badge-success">${c.status}</span></div>`).join('') || '<p class="text-muted">No campaigns found</p>';
    }
    document.addEventListener('DOMContentLoaded', () => { doSearch(); document.getElementById('search-btn').onclick = () => { location.search = '?q=' + encodeURIComponent(document.getElementById('search-input').value); doSearch(); }; });
  </script>
</body>
</html>
