<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — LinkPulse</title>
  <link rel="stylesheet" href="css/style.css" /><link rel="stylesheet" href="css/dashboard.css" /><link rel="stylesheet" href="css/analytics.css" /><link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <div class="particles"></div>
  <div class="app-layout"><div class="main-content">
    <header class="topbar"></header>
    <main class="page-content">
      <div class="page-header reveal"><h1>Settings</h1><p>Configure your workspace and preferences</p></div>
      <div class="tabs reveal"><button class="tab active">General</button><button class="tab">Domains</button><button class="tab">Notifications</button><button class="tab">Advanced</button></div>
      <div class="glass-card reveal">
        <h3 class="mb-3">General Settings</h3>
        <div class="form-group"><label class="form-label">Default short domain</label><select class="form-select"><option>lnk.io</option><option>go.link</option><option>shrt.co</option><option>go.brand.io (custom)</option></select></div>
        <div class="form-group"><label class="form-label"><input type="checkbox" checked /> Auto-generate QR codes for new links</label></div>
        <div class="form-group"><label class="form-label"><input type="checkbox" /> Enable offline analytics caching</label></div>
        <h4 class="mt-3 mb-2">Custom Domain</h4>
        <div class="input-group"><input class="form-input" placeholder="go.yourbrand.com" value="go.brand.io" /><button class="btn btn-secondary">Verify DNS</button></div>
        <h4 class="mt-4 mb-2">Multi-Language</h4>
        <div class="lang-grid"><div class="lang-option active">🇺🇸 English</div><div class="lang-option">🇪🇸 Español</div><div class="lang-option">🇫🇷 Français</div><div class="lang-option">🇩🇪 Deutsch</div><div class="lang-option">🇯🇵 日本語</div><div class="lang-option">🇧🇷 Português</div></div>
        <h4 class="mt-4 mb-2">Keyboard Shortcuts</h4>
        <div class="shortcut-list"><div class="shortcut-item"><span>Quick search</span><span><kbd>Ctrl</kbd> + <kbd>K</kbd></span></div><div class="shortcut-item"><span>New link</span><span><kbd>Ctrl</kbd> + <kbd>N</kbd></span></div><div class="shortcut-item"><span>Dashboard</span><span><kbd>Ctrl</kbd> + <kbd>D</kbd></span></div></div>
        <h4 class="mt-4 mb-2">Voice Commands</h4>
        <div class="voice-ui" style="padding:2rem"><button class="voice-btn" onclick="Notifications.info('Voice command: Create new link')">🎤</button><p class="text-muted mt-2">Click to activate voice commands</p></div>
        <button class="btn btn-primary mt-3">Save Settings</button>
      </div>
    </main>
  </div></div>
  <script src="js/data.js"></script><script src="js/themes.js"></script><script src="js/notifications.js"></script><script src="js/app.js"></script>
</body>
</html>
