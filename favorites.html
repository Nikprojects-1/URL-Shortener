<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Favorites — LinkPulse</title>
  <link rel="stylesheet" href="css/style.css" /><link rel="stylesheet" href="css/dashboard.css" /><link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <div class="particles"></div>
  <div class="app-layout"><div class="main-content">
    <header class="topbar"></header>
    <main class="page-content">
      <div class="page-header reveal"><h1>⭐ Favorites</h1><p>Your starred and pinned links</p></div>
      <div class="links-grid" id="favorites-grid"></div>
    </main>
  </div></div>
  <script src="js/data.js"></script><script src="js/themes.js"></script><script src="js/notifications.js"></script><script src="js/app.js"></script>
  <script>document.addEventListener('DOMContentLoaded',()=>{document.getElementById('favorites-grid').innerHTML=DEMO.links.filter(l=>l.favorite).map(l=>`<div class="link-card reveal"><span>⭐</span><h4>${l.title}</h4><p class="link-url">${l.shortUrl}</p><div class="flex-between mt-2"><span class="text-success">${App.formatNumber(l.clicks)} clicks</span><a href="link-details.html?id=${l.id}" class="btn btn-ghost btn-sm">View</a></div></div>`).join('');});</script>
</body>
</html>
