<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscription Plans — LinkPulse</title>
  <link rel="stylesheet" href="css/style.css" /><link rel="stylesheet" href="css/dashboard.css" /><link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <div class="particles"></div>
  <div class="app-layout"><div class="main-content">
    <header class="topbar"></header>
    <main class="page-content">
      <div class="page-header text-center reveal"><h1>Subscription Plans</h1><p>Choose the plan that fits your needs</p><p class="mt-2"><span class="badge badge-primary">Current: Pro Plan</span></p></div>
      <div class="plans-grid reveal" id="plans-grid"></div>
      <div class="glass-card reveal mt-3"><h3 class="mb-3">Usage This Month</h3>
        <div class="mb-2 flex-between"><span>Links created</span><span>2,847 / 10,000</span></div><div class="progress-bar mb-3"><div class="progress-fill" style="width:28%"></div></div>
        <div class="mb-2 flex-between"><span>API calls</span><span>45,230 / 100,000</span></div><div class="progress-bar mb-3"><div class="progress-fill" style="width:45%"></div></div>
        <div class="mb-2 flex-between"><span>Team members</span><span>5 / 5</span></div><div class="progress-bar"><div class="progress-fill" style="width:100%"></div></div>
      </div>
    </main>
  </div></div>
  <script src="js/data.js"></script><script src="js/themes.js"></script><script src="js/notifications.js"></script><script src="js/app.js"></script>
  <script>document.addEventListener('DOMContentLoaded',()=>{document.getElementById('plans-grid').innerHTML=DEMO.pricing.map(p=>`<div class="glass-card pricing-card ${p.featured?'featured':''} reveal"><h3>${p.name}</h3><div class="price">$${p.price}<span>/${p.period}</span></div><ul style="list-style:none;text-align:left;margin:1.5rem 0">${p.features.map(f=>'<li class="mb-2">✓ '+f+'</li>').join('')}</ul><button class="btn ${p.featured?'btn-primary':'btn-secondary'}" style="width:100%" onclick="Notifications.success('Plan selected: ${p.name}')">${p.cta}</button></div>`).join('');});</script>
</body>
</html>
